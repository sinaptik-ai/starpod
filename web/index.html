<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#09090b">
  <title>Starpod</title>
</head>
<body class="bg-bg text-primary font-sans text-sm antialiased">

<!-- Mobile sidebar overlay -->
<div class="fixed inset-0 bg-black/50 z-[99] hidden" id="sidebar-overlay"></div>

<!-- Layout -->
<div id="layout">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-inner">
      <!-- Sidebar header -->
      <div class="flex items-center justify-between px-5 h-12 border-b border-border-subtle shrink-0">
        <span class="text-xs font-semibold text-muted tracking-wider uppercase">Sessions</span>
        <button class="text-muted hover:text-primary p-1 rounded-md hover:bg-elevated transition-colors cursor-pointer" id="sidebar-close">
          <svg class="w-4 h-4 stroke-current fill-none stroke-2" viewBox="0 0 24 24" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>
      <!-- New chat -->
      <div class="px-4 pt-4 pb-2 shrink-0">
        <button class="w-full px-3 py-2 bg-elevated hover:bg-border-subtle text-secondary hover:text-primary border border-border-main rounded-lg text-xs font-medium cursor-pointer transition-all flex items-center justify-center gap-1.5" id="new-chat-btn">
          <svg class="w-3.5 h-3.5 stroke-current fill-none stroke-2" viewBox="0 0 24 24" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New chat
        </button>
      </div>
      <!-- Session list -->
      <div class="flex-1 overflow-y-auto px-3 py-1" id="session-list">
        <div class="text-center text-dim text-xs py-8">Loading sessions...</div>
      </div>
    </div>
  </aside>

  <!-- Main app -->
  <div id="app" class="flex flex-col min-w-0 flex-1">

    <!-- Header -->
    <header class="flex items-center gap-3 px-5 h-12 shrink-0 border-b border-border-subtle">
      <button class="text-muted hover:text-primary p-1.5 -ml-1.5 rounded-lg hover:bg-elevated transition-colors cursor-pointer" id="menu-btn" aria-label="Sessions">
        <svg class="w-4 h-4 stroke-current fill-none stroke-[1.5]" viewBox="0 0 24 24" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="flex items-center gap-2">
        <span class="font-mono text-sm font-bold tracking-tight text-primary">starpod</span>
      </div>
      <div class="ml-auto flex items-center gap-2 text-xs text-muted select-none">
        <span class="w-1.5 h-1.5 rounded-full shrink-0 dot-connecting" id="status-dot"></span>
        <span id="status-text">connecting</span>
      </div>
    </header>

    <!-- Messages -->
    <div class="flex-1 overflow-y-auto w-full" id="messages-scroll">
      <div id="messages" class="max-w-[740px] mx-auto px-5 pt-4 pb-8 flex flex-col gap-0.5">
        <div class="flex items-center justify-center text-center" id="welcome" style="min-height: calc(100dvh - 120px)">
          <div>
            <div class="font-mono text-3xl font-extrabold tracking-tighter mb-2 bg-gradient-to-b from-primary to-muted bg-clip-text text-transparent select-none">starpod</div>
            <p class="text-sm text-muted mb-8">What can I help you with?</p>
            <div class="flex gap-3 justify-center flex-wrap">
              <div class="flex items-center gap-2 text-xs text-muted px-3 py-1.5 bg-surface border border-border-subtle rounded-lg">
                <kbd class="bg-elevated border border-border-main rounded px-1.5 py-0.5 font-mono text-[11px] text-secondary">Enter</kbd>
                <span>send</span>
              </div>
              <div class="flex items-center gap-2 text-xs text-muted px-3 py-1.5 bg-surface border border-border-subtle rounded-lg">
                <kbd class="bg-elevated border border-border-main rounded px-1.5 py-0.5 font-mono text-[11px] text-secondary">Shift+Enter</kbd>
                <span>new line</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="shrink-0 pt-2 pb-4 w-full">
      <div class="max-w-[740px] mx-auto px-5">
        <div id="attachment-preview" class="hidden gap-2 pb-2 flex-wrap"></div>
        <form id="input-form" class="flex gap-2 items-center bg-input-bg border border-border-main rounded-xl pl-3.5 pr-1.5 py-1.5">
          <input type="file" id="file-input" multiple hidden>
          <button type="button" id="attach-btn" aria-label="Attach file" title="Attach file (max 20 MB)"
            class="text-dim hover:text-accent p-1.5 rounded-lg hover:bg-accent-muted shrink-0 transition-colors cursor-pointer">
            <svg class="w-4 h-4 fill-none stroke-current stroke-2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <textarea id="input-text" placeholder="Ask anything..." rows="1" autofocus
            class="flex-1 bg-transparent border-none py-2 text-primary text-sm resize-none outline-none max-h-40 leading-relaxed placeholder:text-dim"></textarea>
          <button type="submit" id="send-btn" aria-label="Send"
            class="bg-accent text-white border-none rounded-lg w-8 h-8 flex items-center justify-center cursor-pointer transition-all hover:bg-blue-500 active:scale-95 disabled:opacity-20 disabled:cursor-default disabled:transform-none shrink-0">
            <svg class="w-4 h-4 fill-none stroke-current stroke-2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Link preview panel -->
  <aside id="preview-panel">
  <div id="preview-inner">
    <div class="flex items-center justify-between px-4 h-11 shrink-0">
      <span class="text-xs text-muted font-mono truncate flex-1 min-w-0 mr-3" id="preview-url"></span>
      <div class="flex items-center gap-1 shrink-0">
        <a id="preview-open" href="#" target="_blank" rel="noopener" title="Open in new tab"
          class="text-muted hover:text-primary p-1 rounded-md hover:bg-elevated transition-colors">
          <svg class="w-4 h-4 stroke-current fill-none stroke-2" viewBox="0 0 24 24" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <button class="text-muted hover:text-primary p-1 rounded-md hover:bg-elevated transition-colors cursor-pointer" id="preview-close">
          <svg class="w-4 h-4 stroke-current fill-none stroke-2" viewBox="0 0 24 24" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div class="flex-1 relative overflow-hidden rounded-b-2xl" id="preview-body">
      <iframe id="preview-iframe" class="w-full h-full border-none bg-white rounded-b-2xl" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      <div id="preview-fallback" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-surface rounded-b-2xl overflow-hidden">
        <div id="preview-og-image" class="hidden absolute inset-0">
          <img id="preview-og-img" src="" alt="" class="w-full h-full object-cover opacity-15 blur-sm scale-110">
        </div>
        <div class="relative z-10 flex flex-col items-center gap-4 px-8 max-w-[340px] text-center">
          <div class="w-14 h-14 rounded-2xl bg-elevated border border-border-main flex items-center justify-center mb-1">
            <svg class="w-7 h-7 stroke-current text-muted fill-none stroke-[1.5]" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <p id="preview-og-title" class="text-primary text-sm font-semibold leading-snug">Connection refused</p>
          <p class="text-muted text-xs leading-relaxed">This website has blocked embedded previews. You can still view it directly in your browser.</p>
          <a id="preview-fallback-link" href="#" target="_blank" rel="noopener"
            class="inline-flex items-center gap-2 bg-accent hover:bg-blue-500 text-white text-sm font-medium px-5 py-2.5 rounded-xl transition-colors no-underline shadow-lg shadow-accent/20 mt-1">
            <svg class="w-4 h-4 stroke-current fill-none stroke-2" viewBox="0 0 24 24" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Open in new tab
          </a>
        </div>
      </div>
    </div>
  </div>
</aside>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
