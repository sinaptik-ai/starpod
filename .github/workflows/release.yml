name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build but don't publish)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TARBALL="starpod-${VERSION}-${{ matrix.target }}.tar.gz"

          cp "target/${{ matrix.target }}/release/starpod" starpod
          tar czf "$TARBALL" starpod
          rm starpod

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$TARBALL" > "$TARBALL.sha256"
          else
            shasum -a 256 "$TARBALL" > "$TARBALL.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: starpod-${{ matrix.target }}
          path: |
            starpod-*.tar.gz
            starpod-*.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  homebrew:
    name: Update Homebrew Tap
    needs: release
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          get_sha() {
            cat "artifacts/starpod-${TAG}-${1}.tar.gz.sha256" | awk '{print $1}'
          }

          SHA_DARWIN_ARM64=$(get_sha "aarch64-apple-darwin")
          SHA_DARWIN_X86=$(get_sha "x86_64-apple-darwin")
          SHA_LINUX_ARM64=$(get_sha "aarch64-unknown-linux-musl")
          SHA_LINUX_X86=$(get_sha "x86_64-unknown-linux-musl")

          BASE_URL="https://github.com/sinaptik-ai/starpod/releases/download/${TAG}"

          cat > starpod.rb << FORMULA
          class Starpod < Formula
            desc "Personal AI assistant platform"
            homepage "https://starpod.sh"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/starpod-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "${BASE_URL}/starpod-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_X86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/starpod-${TAG}-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "${BASE_URL}/starpod-${TAG}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install "starpod"
            end

            test do
              assert_match "starpod", shell_output("#{bin}/starpod --version")
            end
          end
          FORMULA

      - name: Push to homebrew-tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: starpod.rb
          destination_repo: sinaptik-ai/homebrew-tap
          destination_folder: Formula
          user_email: "github-actions[bot]@users.noreply.github.com"
          user_name: "github-actions[bot]"
          commit_message: "Update starpod to ${{ github.ref_name }}"
