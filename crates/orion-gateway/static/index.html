<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orion</title>
<style>
:root {
  --bg: #0a0a0a;
  --bg-surface: #141414;
  --bg-elevated: #1a1a1a;
  --bg-hover: #222;
  --border: #2a2a2a;
  --border-subtle: #1e1e1e;
  --text: #ececec;
  --text-secondary: #888;
  --text-dim: #555;
  --accent: #7c9fff;
  --accent-muted: rgba(124,159,255,0.12);
  --accent-strong: #5b7fe8;
  --green: #4ade80;
  --green-muted: rgba(74,222,128,0.12);
  --red: #f87171;
  --red-muted: rgba(248,113,113,0.12);
  --yellow: #fbbf24;
  --purple: #a78bfa;
  --purple-muted: rgba(167,139,250,0.1);
  --font-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif;
  --radius: 10px;
  --radius-sm: 6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 780px;
  margin: 0 auto;
}

/* Header — minimal, just a thin bar */
header {
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

header .logo {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
}

header .status {
  font-size: 11px;
  color: var(--text-dim);
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
}

header .status .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dot.connected { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,0.4); }
.dot.disconnected { background: var(--red); }
.dot.connecting { background: var(--yellow); animation: pulse 1.5s ease-in-out infinite; }

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Messages area */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 8px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { max-width: 100%; animation: fadeIn 0.2s ease-out; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* User messages — right-aligned pill */
.msg.user {
  align-self: flex-end;
  max-width: 75%;
}

.msg.user .bubble {
  background: var(--accent-strong);
  color: #fff;
  border-radius: 18px 18px 4px 18px;
  padding: 10px 16px;
  line-height: 1.55;
  font-size: 14px;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Assistant messages — left-aligned, no background */
.msg.assistant .bubble {
  padding: 2px 0;
  line-height: 1.7;
  font-size: 14px;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
}

.msg.assistant .bubble a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid rgba(124,159,255,0.3);
  transition: border-color 0.15s;
}

.msg.assistant .bubble a:hover { border-color: var(--accent); }

.msg.assistant .bubble code {
  background: var(--bg-elevated);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: var(--accent);
}

.msg.assistant .bubble pre {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin: 10px 0;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.5;
  white-space: pre;
  color: var(--text);
}

/* Tool activity — collapsible */
.tool-item {
  margin: 6px 0;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  transition: border-color 0.15s;
}

.tool-item:hover { border-color: var(--border); }

.tool-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  cursor: pointer;
  user-select: none;
  font-size: 12px;
  color: var(--text-secondary);
  transition: background 0.1s;
}

.tool-header:hover { background: var(--bg-hover); }

.tool-chevron {
  font-size: 9px;
  color: var(--text-dim);
  transition: transform 0.2s ease;
  flex-shrink: 0;
  width: 12px;
  text-align: center;
}

.tool-item.expanded .tool-chevron { transform: rotate(90deg); }

.tool-icon {
  font-size: 11px;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  flex-shrink: 0;
}

.tool-icon.read { background: var(--accent-muted); color: var(--accent); }
.tool-icon.write, .tool-icon.edit { background: var(--purple-muted); color: var(--purple); }
.tool-icon.bash { background: var(--green-muted); color: var(--green); }
.tool-icon.grep, .tool-icon.glob { background: var(--accent-muted); color: var(--accent); }
.tool-icon.search { background: var(--accent-muted); color: var(--accent); }
.tool-icon.error { background: var(--red-muted); color: var(--red); }
.tool-icon.default { background: var(--purple-muted); color: var(--purple); }

.tool-name {
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 11.5px;
  color: var(--text);
}

.tool-preview {
  color: var(--text-dim);
  font-size: 11.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}

.tool-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 500;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}

.tool-badge.running {
  background: var(--accent-muted);
  color: var(--accent);
  animation: pulse 1.5s ease-in-out infinite;
}

.tool-badge.ok {
  background: var(--green-muted);
  color: var(--green);
}

.tool-badge.err {
  background: var(--red-muted);
  color: var(--red);
}

.tool-body {
  display: none;
  padding: 0 12px 10px;
  font-size: 12px;
  color: var(--text-secondary);
}

.tool-item.expanded .tool-body { display: block; }

.tool-body pre {
  background: var(--bg);
  border-radius: 4px;
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  line-height: 1.45;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text-secondary);
  max-height: 200px;
  overflow-y: auto;
}

.tool-body .tool-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  margin-bottom: 4px;
  font-weight: 500;
}

.tool-body .tool-section { margin-top: 8px; }
.tool-body .tool-section:first-child { margin-top: 0; }

/* Streaming cursor */
.streaming-cursor::after {
  content: '\2588';
  animation: cursorBlink 1s step-end infinite;
  color: var(--accent);
  font-size: 13px;
  margin-left: 1px;
}

@keyframes cursorBlink { 50% { opacity: 0; } }

/* Stats bar */
.stats {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 12px;
  padding-top: 8px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  gap: 16px;
}

/* Input area */
#input-area {
  padding: 16px 24px 20px;
  flex-shrink: 0;
}

#input-form {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 6px 6px 6px 16px;
  transition: border-color 0.15s;
}

#input-form:focus-within { border-color: var(--accent); }

#input-text {
  flex: 1;
  background: transparent;
  border: none;
  padding: 8px 0;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  resize: none;
  outline: none;
  max-height: 160px;
  line-height: 1.5;
}

#input-text::placeholder { color: var(--text-dim); }

#send-btn {
  background: var(--accent-strong);
  color: #fff;
  border: none;
  border-radius: 10px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity 0.15s;
  flex-shrink: 0;
}

#send-btn:hover { opacity: 0.85; }
#send-btn:disabled { opacity: 0.25; cursor: default; }

#send-btn svg {
  width: 16px;
  height: 16px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Welcome */
.welcome {
  text-align: center;
  color: var(--text-dim);
  margin: auto;
  padding: 40px 20px;
}

.welcome h2 {
  color: var(--text);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.3px;
  margin-bottom: 6px;
}

.welcome p { font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="logo">Orion</span>
    <div class="status">
      <span class="dot connecting" id="status-dot"></span>
      <span id="status-text">Connecting</span>
    </div>
  </header>
  <div id="messages">
    <div class="welcome">
      <h2>Orion</h2>
      <p>Your personal AI assistant. Ask anything.</p>
    </div>
  </div>
  <div id="input-area">
    <form id="input-form">
      <textarea id="input-text" placeholder="Ask Orion anything..." rows="1" autofocus></textarea>
      <button type="submit" id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
      </button>
    </form>
  </div>
</div>

<script>
const messages = document.getElementById('messages');
const inputText = document.getElementById('input-text');
const sendBtn = document.getElementById('send-btn');
const inputForm = document.getElementById('input-form');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

let ws = null;
let isStreaming = false;
let currentMsg = null;
let currentBubble = null;
let reconnectAttempt = 0;

// Track tool inputs and results for expandable details
let toolDataMap = new Map();
let toolCounter = 0;

function setStatus(state) {
  statusDot.className = 'dot ' + state;
  statusText.textContent = state === 'connected' ? 'Connected' :
                           state === 'connecting' ? 'Connecting' : 'Disconnected';
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messages.scrollTop = messages.scrollHeight;
  });
}

function autoResize() {
  inputText.style.height = 'auto';
  inputText.style.height = Math.min(inputText.scrollHeight, 160) + 'px';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatText(text) {
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => '<pre>' + code + '</pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');
  // Linkify URLs (but not those already inside href/src attributes or HTML tags)
  html = html.replace(/(?<![="'])(https?:\/\/[^\s<>"')\]]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  return html;
}

function toolIconClass(name) {
  const n = name.toLowerCase();
  if (n === 'read') return 'read';
  if (n === 'write') return 'write';
  if (n === 'edit') return 'edit';
  if (n === 'bash') return 'bash';
  if (n === 'grep') return 'grep';
  if (n === 'glob') return 'glob';
  if (n.includes('search')) return 'search';
  return 'default';
}

function toolIconSymbol(name) {
  const n = name.toLowerCase();
  if (n === 'read') return '\u25B7';       // play/read
  if (n === 'write') return '\u270E';       // pencil
  if (n === 'edit') return '\u270E';
  if (n === 'bash') return '\u25B8';        // terminal
  if (n === 'grep' || n === 'glob') return '\u2315'; // search
  if (n.includes('memory')) return '\u25C7'; // diamond
  if (n.includes('vault')) return '\u2609';  // key-ish
  return '\u2022';
}

function getToolPreview(name, input) {
  if (input.file_path) return input.file_path;
  if (input.pattern) return input.pattern;
  if (input.command) return input.command.length > 50 ? input.command.slice(0, 50) + '...' : input.command;
  if (input.query) return input.query.length > 50 ? input.query.slice(0, 50) + '...' : input.query;
  if (input.key) return input.key;
  if (input.file) return input.file;
  if (input.name) return input.name;
  return '';
}

function addUserMessage(text) {
  const welcome = messages.querySelector('.welcome');
  if (welcome) welcome.remove();

  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>';
  messages.appendChild(msg);
  scrollToBottom();
}

function startAssistantMessage() {
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  currentMsg = msg;
  currentBubble = null;
  messages.appendChild(msg);
  scrollToBottom();
}

function ensureBubble() {
  if (currentBubble) return currentBubble;
  if (!currentMsg) return null;
  const bubble = document.createElement('div');
  bubble.className = 'bubble streaming-cursor';
  currentMsg.appendChild(bubble);
  currentBubble = bubble;
  return bubble;
}

function appendText(text) {
  const bubble = ensureBubble();
  if (!bubble) return;
  if (!bubble._rawText) bubble._rawText = '';
  bubble._rawText += text;
  bubble.innerHTML = formatText(bubble._rawText);
  bubble.classList.add('streaming-cursor');
  scrollToBottom();
}

function addToolUse(name, input) {
  if (!currentMsg) return;
  if (currentBubble) {
    currentBubble.classList.remove('streaming-cursor');
    currentBubble = null;
  }

  const id = 'tool-' + (toolCounter++);
  const preview = getToolPreview(name, input);

  // Store tool data for expansion
  toolDataMap.set(id, { name, input, result: null, isError: false });

  const el = document.createElement('div');
  el.className = 'tool-item';
  el.id = id;

  const inputJson = JSON.stringify(input, null, 2);

  el.innerHTML =
    '<div class="tool-header" onclick="toggleTool(\'' + id + '\')">' +
      '<span class="tool-chevron">\u25B6</span>' +
      '<span class="tool-icon ' + toolIconClass(name) + '">' + toolIconSymbol(name) + '</span>' +
      '<span class="tool-name">' + escapeHtml(name) + '</span>' +
      '<span class="tool-preview">' + escapeHtml(preview) + '</span>' +
      '<span class="tool-badge running">running</span>' +
    '</div>' +
    '<div class="tool-body">' +
      '<div class="tool-section">' +
        '<div class="tool-label">Input</div>' +
        '<pre>' + escapeHtml(inputJson) + '</pre>' +
      '</div>' +
      '<div class="tool-section tool-result-section" style="display:none">' +
        '<div class="tool-label">Result</div>' +
        '<pre class="tool-result-pre"></pre>' +
      '</div>' +
    '</div>';

  currentMsg.appendChild(el);
  scrollToBottom();
}

function toggleTool(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('expanded');
}

function addToolResult(content, isError) {
  if (!currentMsg) return;
  const tools = currentMsg.querySelectorAll('.tool-item');
  const last = tools[tools.length - 1];
  if (!last) return;

  // Update badge
  const badge = last.querySelector('.tool-badge');
  if (isError) {
    badge.textContent = 'error';
    badge.className = 'tool-badge err';
  } else {
    badge.textContent = 'done';
    badge.className = 'tool-badge ok';
  }

  // Store and show result
  const data = toolDataMap.get(last.id);
  if (data) {
    data.result = content;
    data.isError = isError;
  }

  const resultSection = last.querySelector('.tool-result-section');
  const resultPre = last.querySelector('.tool-result-pre');
  if (resultSection && resultPre && content) {
    resultPre.textContent = content;
    resultSection.style.display = '';
  }

  scrollToBottom();
}

function endStream(data) {
  if (currentMsg) {
    currentMsg.querySelectorAll('.bubble').forEach(b => {
      b.classList.remove('streaming-cursor');
      if (b._rawText) b.innerHTML = formatText(b._rawText);
    });

    if (data.is_error && data.errors && data.errors.length > 0) {
      const hasText = Array.from(currentMsg.querySelectorAll('.bubble')).some(b => b._rawText);
      if (!hasText) {
        const bubble = ensureBubble();
        if (bubble) {
          bubble.innerHTML = '<span style="color:var(--red)">' +
            data.errors.map(escapeHtml).join('<br>') + '</span>';
          bubble.classList.remove('streaming-cursor');
        }
      }
    }

    if (data.num_turns > 0) {
      const stats = document.createElement('div');
      stats.className = 'stats';
      const tokens_in = data.input_tokens >= 1000 ? Math.round(data.input_tokens / 1000) + 'k' : data.input_tokens;
      const tokens_out = data.output_tokens >= 1000 ? Math.round(data.output_tokens / 1000) + 'k' : data.output_tokens;
      stats.innerHTML =
        '<span>' + data.num_turns + ' turn' + (data.num_turns > 1 ? 's' : '') + '</span>' +
        '<span>$' + data.cost_usd.toFixed(4) + '</span>' +
        '<span>' + tokens_in + ' in / ' + tokens_out + ' out</span>';
      currentMsg.appendChild(stats);
    }
  }

  isStreaming = false;
  currentMsg = null;
  currentBubble = null;
  sendBtn.disabled = false;
  inputText.focus();
  scrollToBottom();
}

function connect() {
  setStatus('connecting');
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const token = localStorage.getItem('orion_api_key');
  let url = proto + '//' + location.host + '/ws';
  if (token) url += '?token=' + encodeURIComponent(token);

  ws = new WebSocket(url);

  ws.onopen = () => { setStatus('connected'); reconnectAttempt = 0; };

  ws.onclose = () => {
    setStatus('disconnected');
    if (isStreaming) {
      endStream({ num_turns: 0, cost_usd: 0, input_tokens: 0, output_tokens: 0, is_error: true, errors: ['Connection lost'] });
    }
    const delay = Math.min(1000 * Math.pow(2, reconnectAttempt), 30000);
    reconnectAttempt++;
    setTimeout(connect, delay);
  };

  ws.onerror = () => {};

  ws.onmessage = (event) => {
    let data;
    try { data = JSON.parse(event.data); } catch { return; }

    switch (data.type) {
      case 'stream_start':
        startAssistantMessage();
        break;
      case 'text_delta':
        appendText(data.text);
        break;
      case 'tool_use':
        addToolUse(data.name, data.input);
        break;
      case 'tool_result':
        addToolResult(data.content, data.is_error);
        break;
      case 'stream_end':
        endStream(data);
        break;
      case 'error':
        if (isStreaming) {
          endStream({ num_turns: 0, cost_usd: 0, input_tokens: 0, output_tokens: 0, is_error: true, errors: [data.message] });
        } else {
          startAssistantMessage();
          const bubble = ensureBubble();
          if (bubble) {
            bubble._rawText = 'Error: ' + data.message;
            bubble.innerHTML = '<span style="color:var(--red)">' + escapeHtml(data.message) + '</span>';
            bubble.classList.remove('streaming-cursor');
          }
          currentMsg = null;
          currentBubble = null;
        }
        break;
    }
  };
}

function sendMessage() {
  const text = inputText.value.trim();
  if (!text || isStreaming || !ws || ws.readyState !== WebSocket.OPEN) return;

  addUserMessage(text);
  isStreaming = true;
  sendBtn.disabled = true;

  ws.send(JSON.stringify({ type: 'message', text: text, channel_id: 'web' }));
  inputText.value = '';
  autoResize();
}

inputForm.addEventListener('submit', (e) => { e.preventDefault(); sendMessage(); });

inputText.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

inputText.addEventListener('input', autoResize);

connect();
</script>
</body>
</html>
