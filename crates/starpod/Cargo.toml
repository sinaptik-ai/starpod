[package]
name = "starpod"
version = "0.1.0"
edition = "2021"
description = "Starpod CLI - personal AI assistant"

[[bin]]
name = "starpod"
path = "src/main.rs"

[dependencies]
agent-sdk = { path = "../agent-sdk" }
starpod-core = { path = "../starpod-core" }
starpod-agent = { path = "../starpod-agent" }
starpod-gateway = { path = "../starpod-gateway" }
starpod-telegram = { path = "../starpod-telegram" }
starpod-skills = { path = "../starpod-skills" }
starpod-cron = { path = "../starpod-cron" }
starpod-instances = { path = "../starpod-instances" }
starpod-auth = { path = "../starpod-auth" }
futures = "0.3"
chrono = "0.4"
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["net"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rustyline = "15"
colored = "3"
anyhow = "1"
uuid = { version = "1", features = ["v4"] }
toml = "0.8"
dialoguer = "0.12.0"
dirs = "6"

[dev-dependencies]
assert_cmd = "2"
tempfile = "3"
