[package]
name = "starpod-agent"
version = "0.1.0"
edition = "2021"
description = "Orchestrator for Starpod - wires agent-sdk + memory + session + vault"

[dependencies]
agent-sdk = { path = "../agent-sdk" }
starpod-core = { path = "../starpod-core" }
starpod-memory = { path = "../starpod-memory", features = ["embeddings"] }
starpod-session = { path = "../starpod-session" }
starpod-vault = { path = "../starpod-vault" }
starpod-skills = { path = "../starpod-skills" }
starpod-cron = { path = "../starpod-cron" }
chrono = { version = "0.4", features = ["serde"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }
base64 = "0.22"

[dev-dependencies]
tempfile = "3"
